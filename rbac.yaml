# Kubernetes RBAC for FluxCD Home Assistant Integration
#
# This manifest grants read-only access to FluxCD custom resources.
# Apply this to the namespace where the Home Assistant service account runs,
# or use a ClusterRoleBinding for cluster-wide access.
#
# Usage:
#   kubectl apply -f rbac.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluxcd-hass-reader
rules:
  # GitRepository and HelmRepository (source.toolkit.fluxcd.io)
  - apiGroups:
      - source.toolkit.fluxcd.io
    resources:
      - gitrepositories
      - helmrepositories
    verbs:
      - get
      - list
      - watch

  # Kustomization (kustomize.toolkit.fluxcd.io)
  - apiGroups:
      - kustomize.toolkit.fluxcd.io
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch

  # HelmRelease (helm.toolkit.fluxcd.io)
  - apiGroups:
      - helm.toolkit.fluxcd.io
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluxcd-hass-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluxcd-hass-reader
subjects:
  # Replace with your service account details
  - kind: ServiceAccount
    name: home-assistant
    namespace: default
